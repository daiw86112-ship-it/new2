<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{
            font-family: sans-serif;
            background: #f0f4f8;
            text-align: center;
            padding: 40px 20px;
        }
        .box{
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.1);
        }
        .avatar{
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #409eff;
        }
        h1{
            color: #222;
            margin-bottom: 12px;
        }
        .desc{
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .link-item{
            display: block;
            text-decoration: none;
            color: #fff;
            background: #409eff;
            margin: 12px auto;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
            max-width: 300px;
        }
        .link-item:hover{
            background: #2979cd;
        }
    </style>
</head>
<body>
    <div class="box">
        <!-- https://extensive-rose-4fdwde3nim.edgeone.app/1776434346364.jpeg-->
        <img class="avatar" src="https://picsum.photos/300/300" alt="头像">

        <h1>DWD个人主页</h1>
        <p class="desc">
            欢迎访问DWD的 GitHub 小站<br>
            收藏、分享、记录日常
        </p>

        <!-- 超链接 可随便改地址和文字 -->
        <a class="link-item" href="https://github.com" target="_blank">
            我的 GitHub
        </a>
        <a class="link-item" href="https://www.bilibili.com" target="_blank">
            哔哩哔哩
        </a>
        <a class="link-item" href="https://www.baidu.com" target="_blank">
            百度搜索
        </a>
    </div>
</body>
</html>
