<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWD的个人主页</title>
<style>
:root {
  --apple-black: #000000;
  --apple-gray: #f5f5f7;
  --apple-white: #ffffff;
  --text-dark: #1d1d1f;
  --text-secondary: #6e6e73;
  --blue-action: #0071e3;
  --blue-link: #0066cc;
  --border-soft: #d2d2d7;
  --shadow-light: rgba(0,0,0,0.08);
}

[data-theme="dark"] {
  --apple-gray: #121212;
  --apple-white: #1c1c1e;
  --text-dark: #f5f5f7;
  --text-secondary: #8b8b8f;
  --blue-action: #2997ff;
  --blue-link: #0071e3;
  --border-soft: #3a3a3c;
  --shadow-light: rgba(0,0,0,0.35);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: "SF Pro Text", Helvetica Neue, Helvetica, Arial, sans-serif;
  color: var(--text-dark);
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

/* 动态渐变背景 */
.gradient-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 200%;
  height: 200%;
  background: linear-gradient(135deg, #f5f7fa, #e4eefe, #d7e2f9, #c6d7f5);
  animation: gradientMove 12s ease infinite;
  z-index: -2;
  transition: all 0.4s ease;
}

[data-theme="dark"] .gradient-bg {
  background: linear-gradient(135deg, #141414, #1f242f, #252a3a, #2a2f42);
}

/* 柔光呼吸 */
.glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 50%, rgba(64,158,255,0.08), transparent 60%);
  z-index: -1;
  animation: glowPulse 8s ease-in-out infinite;
}

@keyframes gradientMove {
  0% { transform: translate(-25%, -25%); }
  50% { transform: translate(-50%, -50%); }
  100% { transform: translate(-25%, -25%); }
}

@keyframes glowPulse {
  0%,100% { opacity: 0.4; }
  50% { opacity: 0.7; }
}

/* 背景下落小图案 ✦ ✧ ✩ */
.fall {
  position: fixed;
  top: -10px;
  user-select: none;
  pointer-events: none;
  color: var(--blue-action);
  opacity: 0.3;
  font-size: 12px;
  animation: fallAnim linear infinite;
  z-index: -1;
}

@keyframes fallAnim {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(100vh) rotate(360deg); }
}

.theme-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--apple-white);
  border: none;
  font-size: 18px;
  color: var(--blue-action);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 10px var(--shadow-light);
  cursor: pointer;
  z-index: 999;
  transition: all 0.3s ease;
}

.apple-card {
  max-width: 420px;
  width: 100%;
  background: var(--apple-white);
  border-radius: 20px;
  padding: 48px 32px;
  box-shadow: 0 4px 15px var(--shadow-light);
  text-align: center;
  transition: all 0.4s ease;
  backdrop-filter: blur(10px);
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--blue-action);
  margin-bottom: 24px;
  transition: transform 0.35s ease;
  cursor: pointer;
}
.avatar:hover {
  transform: scale(1.07);
}

h1 {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 0.2px;
  margin-bottom: 12px;
}

.desc {
  font-size: 17px;
  color: var(--text-secondary);
  line-height: 1.47;
  margin-bottom: 32px;
}

.apple-btn {
  display: block;
  width: 100%;
  padding: 14px 0;
  margin-bottom: 16px;
  border-radius: 980px;
  font-size: 17px;
  font-weight: 600;
  text-decoration: none;
  background: var(--blue-action);
  color: #fff;
  transition: all 0.3s ease;
}
.apple-btn:hover {
  background: var(--blue-link);
  transform: translateY(-2px);
}

.micro-text {
  margin-top: 28px;
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: -0.12px;
}

.stars {
  margin-top: 10px;
  font-size: 14px;
  color: var(--blue-action);
  opacity: 0.8;
}

.floating-star {
  position: fixed;
  pointer-events: none;
  font-size: 16px;
  color: var(--blue-action);
  animation: floatStar 1.5s forwards;
  z-index: 99;
}

@keyframes floatStar {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-80px); }
}
</style>
</head>

<body>
<div class="gradient-bg"></div>
<div class="glow"></div>

<button class="theme-toggle" id="themeBtn">🌙</button>

<div class="apple-card">
  <img class="avatar" src="https://extensive-rose-4fdwde3nim.edgeone.app/1776434346364.jpeg" alt="头像">
  <h1>DWD的个人主页</h1>
  <p class="desc">欢迎访问我的 GitHub 小站<br>收藏、分享、记录日常</p>

  <a class="apple-btn" href="https://github.com/daiw86112-ship-it" target="_blank">我的 GitHub</a>
  <a class="apple-btn" href="https://bilibili.com" target="_blank">哔哩哔哩</a>
  <a class="apple-btn" href="https://www.baidu.com" target="_blank">百度搜索</a>
  <a class="apple-btn" href="https://daiw86112-ship-it.github.io/321new/" target="_blank">👉点我👈</a>

  <p class="micro-text">✨ QQ：👉1485715478👈</p>
  <div class="stars">✦ ✧ ✩</div>
</div>

<script>
const themeBtn = document.getElementById('themeBtn');
const html = document.documentElement;

themeBtn.addEventListener('click', () => {
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    themeBtn.textContent = '🌙';
  } else {
    html.setAttribute('data-theme', 'dark');
    themeBtn.textContent = '☀️';
  }
});

const avatar = document.querySelector('.avatar');
avatar.addEventListener('click', () => {
  alert('👋 欢迎来到 DWD 的个人主页');
});

document.addEventListener('click', (e) => {
  const star = document.createElement('div');
  star.className = 'floating-star';
  star.innerText = '✦';
  star.style.left = e.clientX - 8 + 'px';
  star.style.top = e.clientY - 8 + 'px';
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 1500);
});

// 背景自动下落星星 ✦ ✧ ✩
const symbols = ['✦', '✧', '✩', '✦', '✧'];
setInterval(() => {
  const el = document.createElement('div');
  el.className = 'fall';
  el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.animationDuration = (Math.random() * 3 + 4) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}, 300);
</script>
</body>
</html>
