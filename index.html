<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{
            font-family: "Microsoft Yahei",sans-serif;
            background: #f5f7fa;
            color: #333;
            text-align: center;
            padding: 60px 20px;
        }
        .card{
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1{
            font-size: 28px;
            margin-bottom: 15px;
            color: #222;
        }
        p{
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 25px;
        }
        .btn{
            display: inline-block;
            padding: 12px 30px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }
        .btn:hover{
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👋 欢迎来到我的小站</h1>
        <p>这里是我的个人主页<br>欢迎光临</p>
        <a class="btn" href="https://github.com">Enter</a>
    </div>
</body>
</html>
