<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWD的个人主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
}

/* 苹果配色系统 */
:root {
  --apple-black: #000000;
  --apple-gray: #f5f5f7;
  --apple-white: #ffffff;
  --apple-text-dark: #1d1d1f;
  --apple-text-secondary: #6e6e73;
  --apple-blue: #0071e3;
  --apple-blue-light: #2997ff;
  --apple-border-soft: #d2d2d7;
  --apple-shadow: rgba(0, 0, 0, 0.08);
}

body {
  font-family: -apple-system, SF Pro Text, Helvetica Neue, Helvetica, Arial, sans-serif;
  background-color: var(--apple-gray);
  color: var(--apple-text-dark);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* 苹果风卡片 */
.card {
  background: var(--apple-white);
  border-radius: 20px;
  max-width: 420px;
  width: 100%;
  padding: 48px 32px;
  box-shadow: 0 4px 20px var(--apple-shadow);
  text-align: center;
}

/* 苹果风头像 */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--apple-blue);
  margin-bottom: 24px;
  transition: transform 0.3s ease;
  cursor: pointer;
}
.avatar:hover {
  transform: scale(1.05);
}

/* 苹果风标题 */
h1 {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 0.2px;
  color: var(--apple-text-dark);
  margin-bottom: 12px;
}

/* 苹果风描述文本 */
.desc {
  font-size: 17px;
  line-height: 1.47;
  color: var(--apple-text-secondary);
  margin-bottom: 32px;
}

/* 苹果风胶囊按钮 */
.btn {
  display: block;
  width: 100%;
  padding: 14px 0;
  margin-bottom: 16px;
  border-radius: 980px;
  font-size: 17px;
  font-weight: 600;
  text-decoration: none;
  background-color: var(--apple-blue);
  color: #fff;
  transition: background-color 0.3s ease;
}
.btn:hover {
  background-color: #0066cc;
}

/* 苹果风底部提示 */
.tip {
  margin-top: 28px;
  font-size: 12px;
  color: var(--apple-text-secondary);
}
</style>
</head>

<body>
<div class="card">
  <img class="avatar" src="https://extensive-rose-4fdwde3nim.edgeone.app/1776434346364.jpeg" alt="头像">
  <h1>DWD的个人主页</h1>
  <p class="desc">欢迎访问我的 GitHub 小站<br>收藏、分享、记录日常</p>

  <a class="btn" href="https://github.com/daiw86112-ship-it" target="_blank">我的 GitHub</a>
  <a class="btn" href="https://bilibili.com" target="_blank">哔哩哔哩</a>
  <a class="btn" href="https://www.baidu.com" target="_blank">百度搜索</a>

  <p class="tip">✨ 互动模式已开启 · 轻点头像体验</p>
</div>

<script>
// 苹果风轻互动
const avatar = document.querySelector('.avatar');
avatar.addEventListener('click', () => {
  alert('👋 欢迎来到 DWD 的个人主页');
});
</script>
</body>
</html>
